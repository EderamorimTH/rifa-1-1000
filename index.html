<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rifa 1 a 1000 - Caixa de Litrão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-database.js"></script>
    <style>
        /* Estilos iguais ao anterior, copiado para brevidade */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        .number { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .number:hover { transform: scale(1.08); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.2); }
        .available { background: linear-gradient(135deg, #10b981, #34d399); color: #064e3b; border: 3px solid #10b981; }
        .reserved { background: linear-gradient(135deg, #f59e0b, #fbbf24); color: #92400e; border: 3px solid #d97706; animation: pulse 2s infinite; }
        .sold { background: linear-gradient(135deg, #64748b, #475569); color: #f1f5f9; border: 3px solid #475569; opacity: 0.85; }
        .selected { box-shadow: 0 0 0 6px #3b82f6; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .grid-container { scrollbar-width: thin; scrollbar-color: #10b981 #f1f5f9; }
        .modal { animation: modalPop 0.3s ease-out forwards; }
        @keyframes modalPop { 0% { transform: scale(0.7); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-gradient-to-br from-zinc-950 to-zinc-900 text-white min-h-screen">
    <div class="max-w-7xl mx-auto p-4">
        <!-- HEADER, GRID e COLUNA LATERAL iguais ao código anterior, para brevidade não repeti aqui. Copie do seu arquivo anterior e cole. -->
        <!-- ... (insira o HTML do header, grid e painel lateral aqui) ... -->
    </div>

    <!-- MODAL igual ao anterior -->

    <script>
        // Configuração do Firebase (SUBSTITUA COM OS SEUS VALORES DO FIREBASE CONSOLE)
        const firebaseConfig = {
            apiKey: "AIzaSyXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX", // Sua API Key
            authDomain: "seu-projeto.firebaseapp.com",
            databaseURL: "https://seu-projeto-default-rtdb.firebaseio.com", // URL do Realtime Database
            projectId: "seu-projeto",
            storageBucket: "seu-projeto.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234567890:web:xxxxxxxxxxxxxxxxxxxxxxxx"
        };
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database(app);
        const numbersRef = db.ref('numbers'); // Caminho no Firebase onde salvamos os dados

        const ADMIN_PASSWORD = "123456";
        let adminMode = false;
        let numbers = [];
        let selected = new Set();
        const RESERVATION_TIME = 15 * 60 * 1000; // 15 min

        function loadData() {
            numbersRef.once('value').then(snapshot => {
                const data = snapshot.val();
                if (data && data.length === 1000) {
                    numbers = data;
                } else {
                    // Inicializa se não existir
                    numbers = Array.from({length: 1000}, (_, i) => ({
                        num: i + 1,
                        name: "",
                        phone: "",
                        reservedUntil: null,
                        reservedBy: null
                    }));
                    saveData();
                }
                // Limpa reservas expiradas
                const now = Date.now();
                numbers.forEach(n => {
                    if (n.reservedUntil && n.reservedUntil < now) {
                        n.reservedUntil = null;
                        n.reservedBy = null;
                    }
                });
                renderGrid();
            }).catch(err => console.error("Erro ao carregar dados:", err));
        }

        function saveData() {
            numbersRef.set(numbers).catch(err => console.error("Erro ao salvar:", err));
        }

        // RenderGrid igual ao anterior, mas agora escuta mudanças em realtime
        function renderGrid() {
            // ... (código igual ao anterior)
        }

        // ToggleSelect (melhorado para desmarcar reserva ao clicar de novo)
        function toggleSelect(num) {
            const entry = numbers[num - 1];
            const now = Date.now();

            if (entry.name) {
                alert("Número vendido.");
                return;
            }

            if (entry.reservedUntil && entry.reservedUntil > now && entry.reservedBy !== getUserId()) {
                alert("Reservado por outro usuário. Tente outro.");
                return;
            }

            if (selected.has(num)) {
                selected.delete(num);
                entry.reservedUntil = null;
                entry.reservedBy = null;
            } else {
                selected.add(num);
                entry.reservedUntil = now + RESERVATION_TIME;
                entry.reservedBy = getUserId(); // Identificador único por usuário (baseado em timestamp + random)
            }

            saveData();
            renderGrid();

            // Timer para expirar reserva
            setTimeout(() => {
                loadData(); // Recarrega para verificar se expirou
            }, RESERVATION_TIME + 1000);
        }

        function getUserId() {
            let id = localStorage.getItem('userId');
            if (!id) {
                id = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('userId', id);
            }
            return id;
        }

        // QuickAssign, SaveAssignment, etc. iguais ao anterior, mas chamam saveData() que agora usa Firebase

        // Escuta mudanças em realtime (todo mundo vê atualizações instantâneas)
        numbersRef.on('value', snapshot => {
            numbers = snapshot.val() || [];
            renderGrid();
        });

        function init() {
            loadData();
            // ... (resto igual)
        }

        window.onload = init;
    </script>
</body>
</html>
